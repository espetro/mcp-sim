version: 2

env:
  - CGO_ENABLED=0

before:
  hooks:
    - go mod tidy

builds:
  - id: mcp-sim
    main: ./cmd/mcp-sim
    binary: mcp-sim
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/espetro/mcp-sim/internal/version.Version={{.Version}}
      - -X github.com/espetro/mcp-sim/internal/version.Commit={{.ShortCommit}}
      - -X github.com/espetro/mcp-sim/internal/version.Date={{.Date}}

archives:
  - id: default
    format: zip
    format_overrides:
      - goos: linux
        format: tar.gz
    files:
      - LICENSE

checksum:
  name_template: 'mcp-sim_{{.Version}}_checksums.txt'

release:
  github:
    owner: espetro
    name: mcp-sim
  draft: true

project_name: mcp-sim

# Homebrew tap (requires TAP_GITHUB_TOKEN secret with repo scope on espetro/homebrew-mcp-sim)
brews:
  - name: mcp-sim
    repository:
      owner: espetro
      name: homebrew-mcp-sim
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    commit_msg_template: 'ci: bump mcp-sim to {{ .Version }}'
    path: Formula
    test: |
      system "#{bin}/mcp-sim version"
    install: |
      bin.install "mcp-sim"
    service: |
      run [opt_bin/"mcp-sim", "serve", "--listen", ":9090"]
      keep_alive true
      log_path var/"log/mcp-sim.log"
      error_log_path var/"log/mcp-sim.log"
